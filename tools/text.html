<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本工具 - FreeTools</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="../index.html">🛠️ FreeTools</a></div>
        <div class="nav-links">
            <a href="pdf.html">📄 PDF</a>
            <a href="image.html">🖼️ 图片</a>
            <a href="text.html" class="active">📝 文本</a>
            <a href="calc.html">🧮 计算</a>
        </div>
        <div class="nav-right">
            <span class="lang-switch" onclick="toggleLang()">EN/中文</span>
            <a href="../subscribe.html" class="btn-premium">💎 去广告</a>
        </div>
    </nav>

    <div class="tool-page">
        <h1>📝 文本工具</h1>
        <p class="subtitle">纯前端处理，数据不上传</p>

        <div class="tool-nav">
            <a href="#json" class="active" onclick="switchTab('json')">JSON</a>
            <a href="#base64" onclick="switchTab('base64')">Base64</a>
            <a href="#url" onclick="switchTab('url')">URL</a>
            <a href="#markdown" onclick="switchTab('markdown')">Markdown</a>
        </div>

        <!-- JSON -->
        <div id="json" class="tool-workspace">
            <h3>JSON 格式化</h3>
            <textarea id="jsonInput" placeholder="粘贴 JSON 文本..."></textarea>
            <div style="margin-top:10px;">
                <button class="btn btn-primary" onclick="formatJSON()">格式化</button>
                <button class="btn btn-secondary" onclick="minifyJSON()">压缩</button>
                <button class="btn btn-secondary" onclick="validateJSON()">校验</button>
                <button class="btn btn-secondary" onclick="copyText(document.getElementById('jsonOutput').textContent)">复制结果</button>
            </div>
            <div id="jsonOutput" class="result-area" style="margin-top:15px;"><pre>结果将显示在这里...</pre></div>
        </div>

        <!-- Base64 -->
        <div id="base64" class="tool-workspace hidden">
            <h3>Base64 编码/解码</h3>
            <textarea id="b64Input" placeholder="输入文本..."></textarea>
            <div style="margin-top:10px;">
                <button class="btn btn-primary" onclick="encodeB64()">编码</button>
                <button class="btn btn-primary" onclick="decodeB64()">解码</button>
                <button class="btn btn-secondary" onclick="copyText(document.getElementById('b64Output').textContent)">复制</button>
            </div>
            <div id="b64Output" class="result-area" style="margin-top:15px;"><pre>结果将显示在这里...</pre></div>
        </div>

        <!-- URL -->
        <div id="url" class="tool-workspace hidden">
            <h3>URL 编码/解码</h3>
            <textarea id="urlInput" placeholder="输入URL或文本..."></textarea>
            <div style="margin-top:10px;">
                <button class="btn btn-primary" onclick="encodeURL()">编码</button>
                <button class="btn btn-primary" onclick="decodeURL()">解码</button>
                <button class="btn btn-secondary" onclick="copyText(document.getElementById('urlOutput').textContent)">复制</button>
            </div>
            <div id="urlOutput" class="result-area" style="margin-top:15px;"><pre>结果将显示在这里...</pre></div>
        </div>

        <!-- Markdown -->
        <div id="markdown" class="tool-workspace hidden">
            <h3>Markdown 实时预览</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <textarea id="mdInput" placeholder="输入 Markdown..." oninput="renderMarkdown()"></textarea>
                <div id="mdPreview" style="background:#fff; border:1px solid #e8eaed; border-radius:8px; padding:15px; overflow:auto; min-height:200px;"></div>
            </div>
            <p style="color:#9aa0a6; font-size:12px; margin-top:8px;">支持标题、列表、链接、代码块等基础语法</p>
        </div>

        <div class="ad-footer" style="margin-top:30px;">
            <div class="ad-placeholder">📢 广告位</div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="../index.html">首页</a><a href="pdf.html">PDF</a><a href="image.html">图片</a><a href="text.html">文本</a><a href="calc.html">计算</a>
        </div>
        <p>© 2024 FreeTools.</p>
    </footer>

    <script src="../js/app.js"></script>
    <script>
    function switchTab(id) {
        document.querySelectorAll('.tool-workspace').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.tool-nav a').forEach(a => a.classList.remove('active'));
        event.target.classList.add('active');
    }

    function formatJSON() {
        if (!consumeUse()) return;
        try {
            const obj = JSON.parse(document.getElementById('jsonInput').value);
            document.getElementById('jsonOutput').innerHTML = '<pre>' + escapeHtml(JSON.stringify(obj, null, 2)) + '</pre>';
        } catch(e) { document.getElementById('jsonOutput').innerHTML = '<pre style="color:red">错误：' + e.message + '</pre>'; }
    }
    function minifyJSON() {
        if (!consumeUse()) return;
        try {
            const obj = JSON.parse(document.getElementById('jsonInput').value);
            document.getElementById('jsonOutput').innerHTML = '<pre>' + escapeHtml(JSON.stringify(obj)) + '</pre>';
        } catch(e) { document.getElementById('jsonOutput').innerHTML = '<pre style="color:red">错误：' + e.message + '</pre>'; }
    }
    function validateJSON() {
        if (!consumeUse()) return;
        try { JSON.parse(document.getElementById('jsonInput').value); document.getElementById('jsonOutput').innerHTML = '<pre style="color:green">✓ JSON格式正确</pre>'; }
        catch(e) { document.getElementById('jsonOutput').innerHTML = '<pre style="color:red">✗ 错误：' + e.message + '</pre>'; }
    }

    function encodeB64() { if (!consumeUse()) return; document.getElementById('b64Output').innerHTML = '<pre>' + btoa(unescape(encodeURIComponent(document.getElementById('b64Input').value))) + '</pre>'; }
    function decodeB64() { if (!consumeUse()) return; try { document.getElementById('b64Output').innerHTML = '<pre>' + decodeURIComponent(escape(atob(document.getElementById('b64Input').value))) + '</pre>'; } catch(e) { document.getElementById('b64Output').innerHTML = '<pre style="color:red">解码失败</pre>'; } }

    function encodeURL() { if (!consumeUse()) return; document.getElementById('urlOutput').innerHTML = '<pre>' + encodeURIComponent(document.getElementById('urlInput').value) + '</pre>'; }
    function decodeURL() { if (!consumeUse()) return; try { document.getElementById('urlOutput').innerHTML = '<pre>' + decodeURIComponent(document.getElementById('urlInput').value) + '</pre>'; } catch(e) { document.getElementById('urlOutput').innerHTML = '<pre style="color:red">解码失败</pre>'; } }

    function renderMarkdown() {
        const text = document.getElementById('mdInput').value;
        let html = escapeHtml(text)
            .replace(/^### (.*$)/gim, '<h3>$1</h3>')
            .replace(/^## (.*$)/gim, '<h2>$1</h2>')
            .replace(/^# (.*$)/gim, '<h1>$1</h1>')
            .replace(/^\\* (.*$)/gim, '<li>$1</li>')
            .replace(/^\\- (.*$)/gim, '<li>$1</li>')
            .replace(/\\*\\*(.*?)\\*\\*/g, '<strong>$1</strong>')
            .replace(/\\*(.*?)\\*/g, '<em>$1</em>')
            .replace(/`(.*?)`/g, '<code style="background:#f1f3f4;padding:2px 4px;border-radius:3px;">$1</code>')
            .replace(/\\[([^\\]]+)\\]\\(([^)]+)\\)/g, '<a href="$2" target="_blank">$1</a>')
            .replace(/\n/g, '<br>');
        document.getElementById('mdPreview').innerHTML = html;
    }

    function escapeHtml(t) {
        return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    </script>
</body>
</html>
