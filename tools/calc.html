<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算工具 - FreeTools</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="../index.html">🛠️ FreeTools</a></div>
        <div class="nav-links">
            <a href="pdf.html">📄 PDF</a>
            <a href="image.html">🖼️ 图片</a>
            <a href="text.html">📝 文本</a>
            <a href="calc.html" class="active">🧮 计算</a>
        </div>
        <div class="nav-right">
            <span class="lang-switch" onclick="toggleLang()">EN/中文</span>
            <a href="../subscribe.html" class="btn-premium">💎 去广告</a>
        </div>
    </nav>

    <div class="tool-page">
        <h1>🧮 计算工具</h1>
        <p class="subtitle">纯前端计算，无需联网</p>

        <div class="tool-nav">
            <a href="#calc" class="active" onclick="switchTab('calc')">计算器</a>
            <a href="#unit" onclick="switchTab('unit')">单位换算</a>
            <a href="#password" onclick="switchTab('password')">密码生成</a>
            <a href="#loan" onclick="switchTab('loan')">贷款计算</a>
        </div>

        <!-- Calculator -->
        <div id="calc" class="tool-workspace">
            <h3>科学计算器</h3>
            <div class="calculator">
                <div class="calc-display" id="calcDisplay">0</div>
                <div class="calc-buttons">
                    <button class="calc-btn" onclick="calcClear()">C</button>
                    <button class="calc-btn" onclick="calcBack()">⌫</button>
                    <button class="calc-btn" onclick="calcOp('%')">%</button>
                    <button class="calc-btn op" onclick="calcOp('/')">÷</button>
                    <button class="calc-btn" onclick="calcNum('7')">7</button>
                    <button class="calc-btn" onclick="calcNum('8')">8</button>
                    <button class="calc-btn" onclick="calcNum('9')">9</button>
                    <button class="calc-btn op" onclick="calcOp('*')">×</button>
                    <button class="calc-btn" onclick="calcNum('4')">4</button>
                    <button class="calc-btn" onclick="calcNum('5')">5</button>
                    <button class="calc-btn" onclick="calcNum('6')">6</button>
                    <button class="calc-btn op" onclick="calcOp('-')">−</button>
                    <button class="calc-btn" onclick="calcNum('1')">1</button>
                    <button class="calc-btn" onclick="calcNum('2')">2</button>
                    <button class="calc-btn" onclick="calcNum('3')">3</button>
                    <button class="calc-btn op" onclick="calcOp('+')">+</button>
                    <button class="calc-btn" onclick="calcNum('0')">0</button>
                    <button class="calc-btn" onclick="calcNum('.')">.</button>
                    <button class="calc-btn" onclick="calcOp('**')">x²</button>
                    <button class="calc-btn eq" onclick="calcEqual()">=</button>
                </div>
            </div>
        </div>

        <!-- Unit Converter -->
        <div id="unit" class="tool-workspace hidden">
            <h3>单位换算</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
                <div>
                    <label>类型</label>
                    <select id="unitType" onchange="updateUnitOptions()">
                        <option value="length">长度</option>
                        <option value="weight">重量</option>
                        <option value="temperature">温度</option>
                        <option value="area">面积</option>
                        <option value="volume">体积</option>
                    </select>
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr auto 1fr; gap:15px; align-items:end;">
                <div>
                    <label>从</label>
                    <input type="number" id="unitFromVal" value="1" oninput="convertUnit()">
                    <select id="unitFrom" onchange="convertUnit()"></select>
                </div>
                <div style="text-align:center; font-size:24px; padding-bottom:10px;">⇄</div>
                <div>
                    <label>到</label>
                    <input type="number" id="unitToVal" readonly>
                    <select id="unitTo" onchange="convertUnit()"></select>
                </div>
            </div>
        </div>

        <!-- Password -->
        <div id="password" class="tool-workspace hidden">
            <h3>密码生成器</h3>
            <div style="margin-bottom:20px;">
                <label>长度：<input type="range" id="pwdLength" min="6" max="32" value="12" oninput="document.getElementById('pwdLenVal').textContent=this.value"></label>
                <span id="pwdLenVal">12</span>
            </div>
            <div style="margin-bottom:20px;">
                <label><input type="checkbox" id="pwdUpper" checked> 大写字母 (A-Z)</label><br>
                <label><input type="checkbox" id="pwdLower" checked> 小写字母 (a-z)</label><br>
                <label><input type="checkbox" id="pwdNumber" checked> 数字 (0-9)</label><br>
                <label><input type="checkbox" id="pwdSymbol"> 特殊符号 (!@#$)</label>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="pwdOutput" readonly style="font-family:monospace; font-size:18px; letter-spacing:2px;">
                <button class="btn btn-primary" onclick="generatePassword()">生成</button>
                <button class="btn btn-secondary" onclick="copyText(document.getElementById('pwdOutput').value)">复制</button>
            </div>
        </div>

        <!-- Loan -->
        <div id="loan" class="tool-workspace hidden">
            <h3>贷款计算器</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div>
                    <label>贷款金额（万元）</label>
                    <input type="number" id="loanAmount" value="100">
                </div>
                <div>
                    <label>年利率 (%)</label>
                    <input type="number" id="loanRate" value="3.5" step="0.1">
                </div>
                <div>
                    <label>贷款期限（年）</label>
                    <input type="number" id="loanYears" value="30">
                </div>
                <div>
                    <label>还款方式</label>
                    <select id="loanType">
                        <option value="equal">等额本息</option>
                        <option value="principal">等额本金</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" style="margin-top:20px;" onclick="calculateLoan()">计算</button>
            <div id="loanResult" class="result-area" style="margin-top:20px;"><pre>输入参数后点击计算</pre></div>
        </div>

        <div class="ad-footer" style="margin-top:30px;">
            <div class="ad-placeholder">📢 广告位</div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="../index.html">首页</a><a href="pdf.html">PDF</a><a href="image.html">图片</a><a href="text.html">文本</a><a href="calc.html">计算</a>
        </div>
        <p>© 2024 FreeTools.</p>
    </footer>

    <script src="../js/app.js"></script>
    <script>
    function switchTab(id) {
        document.querySelectorAll('.tool-workspace').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.tool-nav a').forEach(a => a.classList.remove('active'));
        event.target.classList.add('active');
    }

    // Calculator
    let calcExpr = '';
    function calcNum(n) { calcExpr += n; document.getElementById('calcDisplay').textContent = calcExpr || '0'; }
    function calcOp(op) { if(calcExpr) calcExpr += op; document.getElementById('calcDisplay').textContent = calcExpr || '0'; }
    function calcClear() { calcExpr = ''; document.getElementById('calcDisplay').textContent = '0'; }
    function calcBack() { calcExpr = calcExpr.slice(0,-1); document.getElementById('calcDisplay').textContent = calcExpr || '0'; }
    function calcEqual() { try { const r = Function('"use strict"; return (' + calcExpr + ')')(); document.getElementById('calcDisplay').textContent = r; calcExpr = String(r); } catch(e) { document.getElementById('calcDisplay').textContent = 'Error'; } }

    // Unit Converter
    const units = {
        length: {m:1, cm:0.01, mm:0.001, km:1000, in:0.0254, ft:0.3048, yd:0.9144, mi:1609.34},
        weight: {kg:1, g:0.001, mg:0.000001, t:1000, lb:0.453592, oz:0.0283495},
        temperature: {C:'t', F:'t', K:'t'},
        area: {m2:1, cm2:0.0001, km2:1000000, ha:10000, acre:4046.86, ft2:0.092903},
        volume: {l:1, ml:0.001, m3:1000, gal:3.78541, 'fl oz':0.0295735}
    };
    function updateUnitOptions() {
        const type = document.getElementById('unitType').value;
        const opts = Object.keys(units[type]).map(k => '<option value="' + k + '">' + k + '</option>').join('');
        document.getElementById('unitFrom').innerHTML = opts;
        document.getElementById('unitTo').innerHTML = opts;
        document.getElementById('unitTo').selectedIndex = 1;
        convertUnit();
    }
    function convertUnit() {
        const type = document.getElementById('unitType').value;
        const from = document.getElementById('unitFrom').value;
        const to = document.getElementById('unitTo').value;
        const val = parseFloat(document.getElementById('unitFromVal').value) || 0;
        let result = 0;
        if (type === 'temperature') {
            let c = val;
            if (from === 'F') c = (val - 32) * 5/9;
            if (from === 'K') c = val - 273.15;
            if (to === 'F') result = c * 9/5 + 32;
            else if (to === 'K') result = c + 273.15;
            else result = c;
        } else {
            result = val * units[type][from] / units[type][to];
        }
        document.getElementById('unitToVal').value = result.toFixed(4).replace(/\.?0+$/,'');
    }
    updateUnitOptions();

    // Password
    function generatePassword() {
        const len = parseInt(document.getElementById('pwdLength').value);
        let chars = '';
        if (document.getElementById('pwdLower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
        if (document.getElementById('pwdUpper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (document.getElementById('pwdNumber').checked) chars += '0123456789';
        if (document.getElementById('pwdSymbol').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
        if (!chars) { alert('至少选择一种字符类型'); return; }
        let pwd = '';
        for (let i = 0; i < len; i++) pwd += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pwdOutput').value = pwd;
    }
    generatePassword();

    // Loan
    function calculateLoan() {
        if (!consumeUse()) return;
        const amount = parseFloat(document.getElementById('loanAmount').value) * 10000;
        const rate = parseFloat(document.getElementById('loanRate').value) / 100 / 12;
        const months = parseInt(document.getElementById('loanYears').value) * 12;
        const type = document.getElementById('loanType').value;
        let result = '';
        if (type === 'equal') {
            const pmt = amount * rate * Math.pow(1 + rate, months) / (Math.pow(1 + rate, months) - 1);
            const total = pmt * months;
            const interest = total - amount;
            result = '月供：' + pmt.toFixed(2) + ' 元\n总还款：' + total.toFixed(2) + ' 元\n总利息：' + interest.toFixed(2) + ' 元';
        } else {
            const base = amount / months;
            let total = 0, interest = 0;
            for (let i = 0; i < months; i++) {
                const pmt = base + (amount - base * i) * rate;
                total += pmt;
            }
            interest = total - amount;
            result = '首月还款：' + (base + amount * rate).toFixed(2) + ' 元\n每月递减约：' + (base * rate).toFixed(2) + ' 元\n总还款：' + total.toFixed(2) + ' 元\n总利息：' + interest.toFixed(2) + ' 元';
        }
        document.getElementById('loanResult').innerHTML = '<pre>' + result + '</pre>';
    }
    </script>
</body>
</html>
